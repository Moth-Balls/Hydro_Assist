<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hydro-Assist Master Controller</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d); 
            min-height: 100vh; padding: 20px; color: #333;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"><path fill="%234caf50" d="M12,2C12,2 6,6 6,12C6,16 8,18 11,19V22H13V19C16,18 18,16 18,12C18,6 12,2 12,2M12,4C12,4 16,8 16,12C16,15 14.5,16.5 12,17V4Z"/></svg>') 12 2, auto !important;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; color: white; margin-bottom: 30px; }
        
        .system-status { 
            background: rgba(255,255,255,0.2); 
            padding: 15px; border-radius: 10px; color: white; 
            margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.3);
            font-size: 1.1em;
        }

        .status-dot { height: 12px; width: 12px; border-radius: 50%; display: inline-block; margin-right: 8px; background: #bbb; }
        .active-dot { background: #4caf50; box-shadow: 0 0 10px #4caf50; animation: pulse 2s infinite; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .sensor-card { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); text-align: center; }
        .sensor-value { font-size: 3.5em; font-weight: bold; color: #667eea; margin: 15px 0; }
        
        .controls { background: white; border-radius: 15px; padding: 20px; margin-bottom: 30px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        input, select, button { padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-weight: bold; cursor: inherit; }
        
        button { background: #667eea; color: white; border: none; transition: 0.3s; min-width: 150px; font-size: 1em; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        button.success { background: #2ecc71; }
        button.danger { background: #e74c3c; }

        .charts-section { background: white; border-radius: 15px; padding: 20px; margin-bottom: 30px; }
        .chart-container { position: relative; height: 250px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Hydro-Assist Master Controller</h1>
            <div class="system-status" id="sysStatus">
                <span id="dot" class="status-dot"></span> System Status: <span id="statusTxt">STANDBY</span>
            </div>
        </header>

        <div class="controls">
            <button onclick="toggleSystem()" id="btnMaster" class="success">🚀 START SYSTEM</button>
            
            <select id="pSel" style="flex-grow: 1;"><option value="">Select Crop Protocol...</option></select>
            
            <button onclick="sendTest()" class="success" style="background: #4caf50;">🧪 Test Data</button>
            <button onclick="clearData()" class="danger" style="min-width: 80px;">Reset</button>
        </div>

        <div id="pInfo" style="margin-bottom: 20px; font-weight: bold; color: white; text-align: center;"></div>

        <div class="dashboard">
            <div class="sensor-card">
                <div>💧 pH Level</div>
                <div class="sensor-value" id="phV">--</div>
                <div id="phT" style="color:#999">Target: --</div>
            </div>
            <div class="sensor-card">
                <div>⚡ EC Level</div>
                <div class="sensor-value" id="ecV">--</div>
                <div id="ecT" style="color:#999">Target: --</div>
            </div>
        </div>

        <div class="charts-section">
            <div class="chart-container"><canvas id="phC"></canvas></div>
            <div class="chart-container"><canvas id="ecC"></canvas></div>
        </div>
    </div>

    <script>
        let sData = []; 
        let phChart, ecChart; 
        let selP = null;
        let masterInterval = null;
        let isSystemRunning = false;
        const MAX_POINTS = 50;

        const pData = [
            {n:"Arugula", phr:"6.0-7.0", ecr:"0.8-1.2"}, 
            {n:"Lettuce", phr:"6.0-7.0", ecr:"0.8-1.2"},
            {n:"Spinach", phr:"6.0-7.0", ecr:"1.8-2.3"}
        ];

        function init() {
            const ctxP = document.getElementById('phC').getContext('2d');
            const ctxE = document.getElementById('ecC').getContext('2d');
            const getCfg = (label, color) => ({
                type:'line',
                data:{ labels:[], datasets:[{ label:label, data:[], borderColor:color, tension:0.4, fill:true, backgroundColor: color + '22' }] },
                options:{ responsive:true, maintainAspectRatio:false, animation: false }
            });

            phChart = new Chart(ctxP, getCfg('pH Level', '#667eea'));
            ecChart = new Chart(ctxE, getCfg('EC Level', '#764ba2'));

            const s = document.getElementById('pSel');
            pData.forEach((p,i)=>{ 
                let o=document.createElement('option'); o.value=i; o.innerText=p.n; s.appendChild(o); 
            });
            s.onchange = (e) => { selP = pData[e.target.value] || null; updateUI(); };
        }

        function updateUI() {
            if(selP) {
                document.getElementById('pInfo').innerText = `Active Protocol: ${selP.n}`;
                document.getElementById('phT').innerText = `Target: ${selP.phr}`;
                document.getElementById('ecT').innerText = `Target: ${selP.ecr}`;
            }
        }

        function toggleSystem() {
            const btn = document.getElementById('btnMaster');
            const dot = document.getElementById('dot');
            const statusTxt = document.getElementById('statusTxt');

            if(isSystemRunning) {
                clearInterval(masterInterval);
                masterInterval = null;
                isSystemRunning = false;
                btn.innerHTML = "🚀 START SYSTEM";
                btn.className = "success";
                dot.className = "status-dot";
                statusTxt.innerText = "STANDBY";
            } else {
                isSystemRunning = true;
                btn.innerHTML = "🛑 STOP SYSTEM";
                btn.className = "danger";
                dot.className = "status-dot active-dot";
                masterInterval = setInterval(runControlLogic, 10000); // Checks every 10 seconds
                runControlLogic(); 
            }
        }

        function runControlLogic() {
            const timeStr = new Date().toLocaleTimeString();
            document.getElementById('statusTxt').innerText = `RUNNING (Last Check: ${timeStr})`;
            // Put actual time-based relay commands or API calls here
            console.log("System automation check performed at " + timeStr);
        }

        function pushData(ph, ec) {
            const t = new Date().toLocaleTimeString();
            sData.unshift({t, ph, ec});
            if(sData.length > MAX_POINTS) sData.pop();

            document.getElementById('phV').innerText = ph.toFixed(2);
            document.getElementById('ecV').innerText = ec.toFixed(0);
            
            const revData = [...sData].reverse();
            phChart.data.labels = revData.map(x=>x.t);
            phChart.data.datasets[0].data = revData.map(x=>x.ph);
            ecChart.data.labels = revData.map(x=>x.t);
            ecChart.data.datasets[0].data = revData.map(x=>x.ec);
            phChart.update('none'); 
            ecChart.update('none');
        }

        // Standard Test Data Function
        function sendTest() {
            const ph = 5.5 + (Math.random() * 1.5);
            const ec = 800 + (Math.random() * 400);
            pushData(ph, ec);
        }

        function clearData() {
            if(confirm("Clear all historical data?")) {
                sData = [];
                document.getElementById('phV').innerText = "--";
                document.getElementById('ecV').innerText = "--";
                phChart.data.labels = [];
                phChart.data.datasets[0].data = [];
                ecChart.data.labels = [];
                ecChart.data.datasets[0].data = [];
                phChart.update();
                ecChart.update();
            }
        }

        window.onload = init;
    </script>
</body>
</html>
